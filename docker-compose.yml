version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: dualmode-starter_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./app/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - dualmode-starter-network

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.backend
    container_name: dualmode-starter_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dualmode-starter-network

  mysql:
    image: mysql:8.0
    container_name: dualmode-starter_mysql
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - .env
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - dualmode-starter-network

  redis:
    image: redis:7.0-alpine
    container_name: dualmode-starter_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
      - ./app/config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - dualmode-starter-network

networks:
  dualmode-starter-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
